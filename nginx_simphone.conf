# ====================================================
# Nginx 설정 파일 - simphone.kro.kr
# EC2에서: sudo cp nginx_simphone.conf /etc/nginx/sites-available/simphone
#           sudo ln -sf /etc/nginx/sites-available/simphone /etc/nginx/sites-enabled/simphone
#           sudo nginx -t && sudo systemctl reload nginx
# ====================================================

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name simphone.kro.kr;

    # Certbot 인증서 갱신을 위한 경로
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 나머지는 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl;
    server_name simphone.kro.kr;

    # SSL 인증서 (Let's Encrypt - Certbot이 자동 설정)
    ssl_certificate /etc/letsencrypt/live/simphone.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/simphone.kro.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # -----------------------------------------------
    # 1. /api/** → Spring Boot 백엔드 (포트 8080)
    # -----------------------------------------------
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 파일 업로드 용량 제한 (이미지 업로드 대비)
        client_max_body_size 20M;
    }

    # -----------------------------------------------
    # 2. 핸드폰 이미지 (uploads 폴더 직접 서빙)
    # -----------------------------------------------
    location ^~ /images/phones/ {
        alias /home/ubuntu/capstone-phoneshop-backend/uploads/phones/;
    }

    # -----------------------------------------------
    # 3. 정적 파일 / React SPA
    # -----------------------------------------------
    root /home/ubuntu/capstone-phoneshop-frontend/build;
    index index.html;

    location / {
        # 정적 파일이 있으면 서빙, 없으면 index.html (React Router 처리)
        try_files $uri $uri/ /index.html;
    }

    # JS/CSS/이미지 등 정적 에셋 캐시
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
